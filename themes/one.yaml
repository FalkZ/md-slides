# yaml-language-server: $schema=https://raw.githubusercontent.com/FalkZ/md-slides/refs/heads/main/theming/theme_schema.json
# Colors sourced from Zed One Dark / One Light
# https://github.com/zed-industries/zed/blob/main/assets/themes/one/one.json

light:
  root: bg-[#fafafa]
  p: text-[#121317]
  h1: text-[#ffffff] bg-[#4866c9] font-bold
  h2: text-[#ffffff] bg-[#4866c9] font-bold
  h3: text-[#4866c9] font-bold decoration-single
  h4: text-[#4866c9] font-bold decoration-single
  h5: text-[#4866c9] font-bold decoration-single
  h6: text-[#4866c9] font-bold decoration-single
  blockquote: text-[#6b6d72] font-italic
  link: text-[#2a3f8a] decoration-single
  img: text-[#a2a3a7] font-italic
  list: text-[#121317]
  status: text-[#121317]
  code:
    block: text-[#6b6d72]
    inline: text-[#e07468]
    syntax:
      keyword: text-[#b85dc0] font-bold
      string: text-[#78b56b]
      comment: text-[#6b6d72] font-italic
      function: text-[#6f8ef0]
      function_method: text-[#6f8ef0]
      function_builtin: text-[#4a98cc]
      function_name: text-[#6f8ef0]
      type: text-[#4a98cc]
      number: text-[#c48535]
      operator: text-[#4a98cc]
      variable: text-[#242529]
      property: text-[#e07468]
      constant_builtin: text-[#c48535] font-bold
      escape: text-[#e07468]
  table:
    header: text-[#4866c9] font-bold
    cell: text-[#121317]
    separator: text-[#d4d4d8]

dark:
  root: bg-[#282c34]
  p: text-[#d5dae6]
  h1: text-[#000000] bg-[#5a8ed8] font-bold
  h2: text-[#000000] bg-[#5a8ed8] font-bold
  h3: text-[#5a8ed8] font-bold decoration-single
  h4: text-[#5a8ed8] font-bold decoration-single
  h5: text-[#5a8ed8] font-bold decoration-single
  h6: text-[#5a8ed8] font-bold decoration-single
  blockquote: text-[#9aa0ad] font-italic
  link: text-[#9ac2f5] decoration-single
  img: text-[#5d636f] font-italic
  list: text-[#d5dae6]
  status: text-[#d5dae6]
  code:
    block: text-[#9aa0ad]
    inline: text-[#e08589]
    syntax:
      keyword: text-[#c98de5] font-bold
      string: text-[#b5d49a]
      comment: text-[#9aa0ad] font-italic
      function: text-[#8ec0f0]
      function_method: text-[#8ec0f0]
      function_builtin: text-[#88ccd6]
      function_name: text-[#8ec0f0]
      type: text-[#88ccd6]
      number: text-[#d4aa80]
      operator: text-[#88ccd6]
      variable: text-[#c0c6d2]
      property: text-[#e08589]
      constant_builtin: text-[#d4aa80] font-bold
      escape: text-[#e08589]
  table:
    header: text-[#5a8ed8] font-bold
    cell: text-[#d5dae6]
    separator: text-[#3e4451]
