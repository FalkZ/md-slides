# yaml-language-server: $schema=./theme_schema.json
# Colors sourced from Zed One Dark / One Light
# https://github.com/zed-industries/zed/blob/main/assets/themes/one/one.json

light:
  root: bg-[#fafafa]
  p: text-[#242529]
  h1: text-[#5b79e3] font-bold underline decoration-double
  h2: text-[#5b79e3] font-bold underline decoration-solid
  h3: text-[#5b79e3] font-bold
  h4: text-[#5b79e3] font-bold
  h5: text-[#5b79e3] font-bold
  h6: text-[#5b79e3] font-bold
  blockquote: text-[#a2a3a7] font-italic
  link: text-[#5b79e3] font-dim
  img: text-[#a2a3a7] font-italic
  list: text-[#242529]
  hr: text-[#d4d4d8]
  status: text-[#242529]
  code:
    block: text-[#a2a3a7]
    inline: text-[#d3604f]
    syntax:
      keyword: text-[#a449ab] font-bold
      string: text-[#649f57]
      comment: text-[#a2a3a7] font-italic
      function: text-[#5b79e3]
      function_method: text-[#5b79e3]
      function_builtin: text-[#3882b7]
      function_name: text-[#5b79e3]
      type: text-[#3882b7]
      number: text-[#ad6e25]
      operator: text-[#3882b7]
      variable: text-[#242529]
      property: text-[#d3604f]
      constant_builtin: text-[#ad6e25] font-bold
      escape: text-[#d3604f]
  table:
    header: text-[#5b79e3] font-bold
    cell: text-[#242529]
    separator: text-[#d4d4d8]

dark:
  root: bg-[#282c34]
  p: text-[#acb2be]
  h1: text-[#73ade9] font-bold underline decoration-double
  h2: text-[#73ade9] font-bold underline decoration-solid
  h3: text-[#73ade9] font-bold
  h4: text-[#73ade9] font-bold
  h5: text-[#73ade9] font-bold
  h6: text-[#73ade9] font-bold
  blockquote: text-[#5d636f] font-italic
  link: text-[#73ade9] font-dim
  img: text-[#5d636f] font-italic
  list: text-[#acb2be]
  hr: text-[#3e4451]
  status: text-[#acb2be]
  code:
    block: text-[#5d636f]
    inline: text-[#d07277]
    syntax:
      keyword: text-[#b477cf] font-bold
      string: text-[#a1c181]
      comment: text-[#5d636f] font-italic
      function: text-[#73ade9]
      function_method: text-[#73ade9]
      function_builtin: text-[#6eb4bf]
      function_name: text-[#73ade9]
      type: text-[#6eb4bf]
      number: text-[#bf956a]
      operator: text-[#6eb4bf]
      variable: text-[#acb2be]
      property: text-[#d07277]
      constant_builtin: text-[#bf956a] font-bold
      escape: text-[#d07277]
  table:
    header: text-[#73ade9] font-bold
    cell: text-[#acb2be]
    separator: text-[#3e4451]
